<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5722" />
      <stop offset="50%" stop-color="#E91E63" />
      <stop offset="100%" stop-color="#9C27B0" />
    </linearGradient>
    
    <!-- Card Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05" />
    </linearGradient>

    <!-- Button Gradient -->
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFEB3B" />
      <stop offset="100%" stop-color="#FF9800" />
    </linearGradient>
    
    <!-- Drop Shadow for Card -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.3" />
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.15" />
    </filter>

    <!-- Glow for Button -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#FF9800" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="800" height="400" rx="24" fill="url(#bgGrad)" />
  
  <!-- Subtle pattern/grid in the background -->
  <g opacity="0.08">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350" stroke="#FFFFFF" stroke-width="1" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400" stroke="#FFFFFF" stroke-width="1" />
  </g>
  
  <!-- Abstract Expressive Shapes in the background -->
  <path d="M 120 70 C 140 50, 170 50, 190 70 C 210 90, 210 120, 190 140 C 170 160, 140 160, 120 140 C 100 120, 100 90, 120 70 Z" fill="#FFFFFF" opacity="0.1" transform="rotate(15 150 100)" />
  <path d="M 680 270 C 700 250, 730 250, 750 270 C 770 290, 770 320, 750 340 C 730 360, 700 360, 680 340 C 660 320, 660 290, 680 270 Z" fill="#FFFFFF" opacity="0.1" transform="rotate(-30 710 300)" />

  <!-- Main Card (Glassmorphism + Expressive outline) -->
  <rect x="80" y="60" width="640" height="280" rx="32" fill="url(#cardGrad)" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.3" filter="url(#shadow)" />
  
  <!-- Inside Card Content -->
  <!-- Icon / Shape badge -->
  <g transform="translate(130, 130)">
    <!-- Expressive shape (star/flower-ish) -->
    <path d="M 40 0 C 60 10, 70 30, 80 40 C 70 50, 60 70, 40 80 C 20 70, 10 50, 0 40 C 10 30, 20 10, 40 0 Z" fill="#FFEB3B" opacity="0.9" />
    <!-- Pulse icon / Sparkle inside badge -->
    <path d="M 40 25 L 43 37 L 55 40 L 43 43 L 40 55 L 37 43 L 25 40 L 37 37 Z" fill="#FF5722" />
  </g>
  
  <!-- Main Title and Description -->
  <text x="240" y="150" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="38" font-weight="800" fill="#FFFFFF" letter-spacing="-0.5">
    Material Expressive
  </text>
  
  <text x="240" y="185" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#FFE0B2" opacity="0.95">
    A Complete M3 Expressive Design System
  </text>

  <text x="240" y="210" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#FFFFFF" opacity="0.75">
    Spring Physics • 35 Morphable Shapes • Adaptive Layouts
  </text>
  
  <!-- Interactive 'Click Me' Button -->
  <g transform="translate(240, 240)">
    <!-- Pill button -->
    <rect x="0" y="0" width="160" height="48" rx="24" fill="url(#btnGrad)" filter="url(#glow)" />
    <!-- Button Text -->
    <text x="65" y="29" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#212121" text-anchor="middle">
      Click Me
    </text>
    <!-- Arrow Icon -->
    <path d="M 105 24 L 115 24 M 111 20 L 115 24 L 111 28" stroke="#212121" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Finger/Hand Cursor Symbol indicating 'click' -->
    <g transform="translate(145, 28)">
      <!-- Hand Icon -->
      <path d="M 0 0 C -2 -2, -5 -2, -7 -2 C -9 -2, -11 -1, -12 1 L -15 6 C -16 8, -17 11, -17 13 L -17 21 C -17 23, -15 25, -13 25 L -7 25 C -5 25, -3 24, -2 22 L 3 14 C 4 12, 4 9, 2 7 C 1 5, -1 4, -2 5 L -5 7 L -5 -2 C -5 -5, -8 -7, -10 -7 C -12 -7, -14 -5, -14 -2 L -14 5" fill="#FFFFFF" stroke="#000000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      <!-- Click animation ripple lines -->
      <path d="M -10 -15 A 8 8 0 0 1 -2 -12" fill="none" stroke="#FFEB3B" stroke-width="2.5" stroke-linecap="round" />
      <path d="M -15 -18 A 12 12 0 0 1 3 -13" fill="none" stroke="#FFEB3B" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 2" />
    </g>
  </g>
</svg>
