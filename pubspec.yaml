name: material_expressive
description: A complete expressive design system for Flutter — tokens, motion, shapes, theme generation, adaptive layouts, loading indicators, animated icons, and screen templates.
version: 0.4.0
homepage: https://github.com/Najeer-k11/material_expressive
repository: https://github.com/Najeer-k11/material_expressive
issue_tracker: https://github.com/Najeer-k11/material_expressive/issues

environment:
  sdk: ^3.12.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  animations: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

topics:
  - design-system
  - material-design
  - theming
  - animation
  - ui

flutter:
  uses-material-design: true
